<div hlmCard class="p-4 space-y-4">
  <h4 class="font-medium text-sm">Edit Trip</h4>

  <div class="grid md:grid-cols-2 gap-3">
    <div class="md:col-span-2 space-y-1.5">
      <label hlmLabel>Trip Name</label>
      <input hlmInput [value]="tripName()" (input)="tripName.set($any($event.target).value)" />
    </div>
    <div class="space-y-1.5">
      <label hlmLabel>Trip Type</label>
      <hlm-select [value]="tripType()" (valueChange)="onTripTypeChange($event)">
        <hlm-select-trigger><hlm-select-value /></hlm-select-trigger>
        <ng-template hlmSelectPortal>
          <hlm-select-content>
            @for (t of tripTypes; track t) {
              <hlm-select-item [value]="t">{{ t }}</hlm-select-item>
            }
          </hlm-select-content>
        </ng-template>
      </hlm-select>
    </div>
    <div class="space-y-1.5">
      <label hlmLabel>Budget (₹)</label>
      <input
        hlmInput
        type="number"
        min="1"
        step="1"
        [value]="budget()"
        (input)="budget.set($any($event.target).value)"
      />
    </div>
    <div class="space-y-1.5">
      <label hlmLabel>Source Location</label>
      <input hlmInput [value]="source()" (input)="source.set($any($event.target).value)" />
    </div>
    <div class="space-y-1.5">
      <label hlmLabel>Destination</label>
      @if (destinationsLoading()) {
        <p class="text-xs text-muted-foreground py-2">Loading destinations…</p>
      } @else if (destinationsError()) {
        <p class="text-xs text-destructive py-2">Could not load destinations.</p>
      } @else {
        <hlm-select
          [value]="selectedDestinationId()"
          [itemToString]="destinationIdToLabel"
          (valueChange)="onDestinationChange($event)"
        >
          <hlm-select-trigger><hlm-select-value /></hlm-select-trigger>
          <ng-template hlmSelectPortal>
            <hlm-select-content>
              @for (d of destinations(); track d.destinationId) {
                <hlm-select-item [value]="d.destinationId.toString()">{{ destinationLabel(d) }}</hlm-select-item>
              }
            </hlm-select-content>
          </ng-template>
        </hlm-select>
      }
    </div>
    <div class="space-y-1.5">
      <label hlmLabel>Start Date</label>
      <input hlmInput type="date" [value]="startDate()" (input)="startDate.set($any($event.target).value)" />
    </div>
    <div class="space-y-1.5">
      <label hlmLabel>End Date</label>
      <input hlmInput type="date" [value]="endDate()" (input)="endDate.set($any($event.target).value)" />
    </div>
  </div>

  @if (error()) {
    <p class="text-xs text-destructive whitespace-pre-line">{{ error() }}</p>
  }

  <div class="flex gap-2">
    <button hlmBtn size="sm" [disabled]="submitting() || destinationsLoading() || destinationsError()" (click)="submit()">
      @if (submitting()) { Saving… } @else { Save Changes }
    </button>
    <button hlmBtn variant="outline" size="sm" [disabled]="submitting()" (click)="cancelled.emit()">Cancel</button>
  </div>
</div>
