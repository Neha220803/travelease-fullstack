<app-page-header title="Notifications" subtitle="Trip updates, invites, and settlements." />

<div hlmCard>
  <div hlmCardContent class="pt-5 divide-y relative min-h-[200px]">
    @if (isLoading()) {
      <div class="absolute inset-0 grid place-items-center bg-background/50 z-10">
        <div class="animate-spin h-6 w-6 border-2 border-primary border-t-transparent rounded-full"></div>
      </div>
    }

    @if (!isLoading() && notifications().length === 0) {
      <div class="text-center py-8 text-muted-foreground">
        No notifications yet.
      </div>
    }

    @for (n of notifications(); track n.notificationId) {
      <div class="flex gap-4 py-4" [ngClass]="{'opacity-60': n.isRead}">
        <div class="h-10 w-10 shrink-0 rounded-md bg-primary/10 text-primary grid place-items-center">
          <ng-icon [name]="getIcon(n.notificationType)" class="h-5 w-5" />
        </div>
        <div class="flex-1">
          <p class="font-medium flex items-center justify-between">
            {{ n.title }}
            <span class="text-xs font-normal text-muted-foreground">{{ n.createdDate | date:'medium' }}</span>
          </p>
          <p class="text-sm text-muted-foreground mt-1">{{ n.message }}</p>
          
          @if (!n.isRead) {
            <div class="mt-2 flex justify-end">
              <button hlmBtn variant="ghost" size="sm" (click)="markAsRead(n)">Mark as Read</button>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
