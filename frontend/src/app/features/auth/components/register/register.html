<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-indigo-50/50 p-4 absolute inset-0 z-[100] bg-white">
  <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-white rounded-3xl p-8 shadow-2xl shadow-indigo-100/50">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Create an account</h1>
      <p class="text-slate-500 mt-2 text-sm">Join TravelEase to start managing your trips</p>
    </div>

    <form class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">First name</label>
          <input type="text" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="John" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Last name</label>
          <input type="text" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="Doe" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
        <input type="email" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="Enter your email" />
      </div>
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
        <input type="password" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="Create a password" />
      </div>

      <button type="button" routerLink="/admin" class="w-full py-3.5 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white rounded-xl font-semibold shadow-lg shadow-indigo-200 transform transition-all active:scale-[0.98] mt-2">
        Sign up
      </button>
    </form>

    <div class="mt-8 text-center text-sm text-slate-500">
      Already have an account? 
      <a routerLink="/auth/login" class="font-semibold text-indigo-600 hover:text-indigo-700">Sign in</a>
    </div>
  </div>
</div>
