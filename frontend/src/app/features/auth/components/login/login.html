<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-indigo-50/50 p-4 absolute inset-0 z-[100] bg-white">
  <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-white rounded-3xl p-8 shadow-2xl shadow-indigo-100/50">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-2xl mx-auto shadow-lg shadow-indigo-200 mb-4">
        T
      </div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Welcome back</h1>
      <p class="text-slate-500 mt-2 text-sm">Sign in to continue to TravelEase</p>
    </div>

    <form class="space-y-5" (ngSubmit)="login()">
      @if (error) {
        <div class="p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100">
          {{ error }}
        </div>
      }

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
        <input type="email" name="email" [(ngModel)]="email" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="Enter your email" required />
      </div>
      
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="block text-sm font-medium text-slate-700">Password</label>
          <a routerLink="/auth/forgot-password" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">Forgot password?</a>
        </div>
        <input type="password" name="password" [(ngModel)]="password" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="Enter your password" required />
      </div>

      <button type="submit" [disabled]="loading" class="w-full py-3.5 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 disabled:opacity-70 text-white rounded-xl font-semibold shadow-lg shadow-indigo-200 transform transition-all active:scale-[0.98]">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <div class="mt-8 text-center text-sm text-slate-500">
      Don't have an account? 
      <a routerLink="/auth/register" class="font-semibold text-indigo-600 hover:text-indigo-700">Sign up</a>
    </div>
  </div>
</div>
