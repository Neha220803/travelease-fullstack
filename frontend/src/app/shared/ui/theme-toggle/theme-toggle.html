<button
  hlmBtn
  variant="ghost"
  size="icon"
  type="button"
  [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
  (click)="toggle()"
>
  <ng-icon [name]="themeService.theme() === 'dark' ? 'lucideSun' : 'lucideMoon'" class="h-5 w-5" />
</button>
