<aside class="fixed left-0 top-16 bottom-0 w-64 bg-white border-r border-slate-200 overflow-y-auto hidden md:block">
  <div class="p-4 space-y-8">
    
    <!-- Main Menu -->
    <div>
      <h3 class="px-3 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Main</h3>
      <div class="space-y-1">
        <a routerLink="/trips" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-[.active]:text-indigo-600">
            <rect width="7" height="9" x="3" y="3" rx="1" />
            <rect width="7" height="5" x="14" y="3" rx="1" />
            <rect width="7" height="9" x="14" y="12" rx="1" />
            <rect width="7" height="5" x="3" y="16" rx="1" />
          </svg>
          Dashboard
        </a>
      </div>
    </div>

    <!-- Travel Management -->
    <div>
      <h3 class="px-3 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Travel</h3>
      <div class="space-y-1">
        <a routerLink="/transport" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-[.active]:text-indigo-600">
            <rect width="16" height="16" x="4" y="4" rx="2" />
            <path d="M4 12h16" />
            <path d="M12 4v16" />
          </svg>
          Transport
        </a>
        <a routerLink="/hotels" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-[.active]:text-indigo-600">
            <path d="M10 22v-6.57" />
            <path d="M12 11h.01" />
            <path d="M12 7h.01" />
            <path d="M14 15.43V22" />
            <path d="M15 16a5 5 0 0 0-6 0" />
            <path d="M16 11h.01" />
            <path d="M16 7h.01" />
            <path d="M8 11h.01" />
            <path d="M8 7h.01" />
            <rect x="4" y="2" width="16" height="20" rx="2" />
          </svg>
          Hotels
        </a>
        <a routerLink="/itinerary" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-[.active]:text-indigo-600">
            <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
            <line x1="16" x2="16" y1="2" y2="6" />
            <line x1="8" x2="8" y1="2" y2="6" />
            <line x1="3" x2="21" y1="10" y2="10" />
            <path d="M8 14h.01" />
            <path d="M12 14h.01" />
            <path d="M16 14h.01" />
            <path d="M8 18h.01" />
            <path d="M12 18h.01" />
            <path d="M16 18h.01" />
          </svg>
          Itinerary
        </a>
      </div>
    </div>

    <!-- Finances & Analytics -->
    <div>
      <h3 class="px-3 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Finances</h3>
      <div class="space-y-1">
        <a routerLink="/budget" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-[.active]:text-indigo-600">
            <rect width="20" height="14" x="2" y="5" rx="2" />
            <line x1="2" x2="22" y1="10" y2="10" />
          </svg>
          Budget
        </a>
      </div>
    </div>

    <!-- User Settings -->
    <div class="pt-4 border-t border-slate-100">
      <a routerLink="/auth/login" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-rose-600 hover:bg-rose-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" x2="9" y1="12" y2="12" />
        </svg>
        Sign Out
      </a>
    </div>

  </div>
</aside>
