spring.application.name=backend

spring.datasource.url=jdbc:h2:mem:travelease;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Seed data auto-loading (deferred until after Hibernate creates tables)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:seed_data.sql
spring.sql.init.continue-on-error=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=DmuT0oeQL5ytMIOwMiRKQuze3+7V86yyH1PloI0lb8k=
app.jwt.expiration-ms=900000

# CORS Configuration
app.cors.allowed-origins=http://localhost:4200

# Scheduler default provider (used by busbooking's ReportScheduler)
app.scheduler.default-provider-id=1
